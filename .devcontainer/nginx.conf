# PhysiCar Nginx Configuration (Codespaces)

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream novnc_backend {
    server 127.0.0.1:6080;
}

upstream myapp_backend {
    server 127.0.0.1:5000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;
    absolute_redirect off;

    client_max_body_size 500M;

    # ── Gazebo 3D Viewer (/gz) ──

    location = /gz {
        return 302 /gz/;
    }

    location /gz/ {
        alias /home/physicar/physicar_ws/.devcontainer/physicar-sim/share/;
        index index.html;

        # Track assets (.world/.sdf/.dae/.png/...) reuse the same filenames
        # across track swaps. We let the browser cache them but require
        # revalidation on every request: nginx returns 304 (empty body) when
        # the file's mtime/size are unchanged, and a fresh 200 the moment any
        # asset is updated. ETag + If-Modified-Since are nginx defaults.
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Sim API (world list, status, switch)
    location /gz/api/ {
        proxy_pass http://127.0.0.1:9003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # Gazebo WebSocket (3D scene streaming)
    location /gz/ws {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ── noVNC (/vnc) ──

    location = /vnc {
        return 302 /vnc/?path=vnc/websockify&autoconnect=true&scale=true;
    }

    location ~ ^/vnc/(.+\.html)$ {
        set $vnc_page $1;
        if ($arg_path = "") {
            return 302 $uri?path=vnc/websockify&autoconnect=true&scale=true;
        }
        proxy_pass http://novnc_backend/$vnc_page$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<style>#top_bar,.noVNC_button,.noVNC_panel{display:none!important}html,body,#screen{overflow:hidden!important}</style></head>';
        sub_filter_once on;
    }

    location = /vnc/ {
        if ($arg_path = "") {
            return 302 /vnc/?path=vnc/websockify&autoconnect=true&scale=true;
        }
        proxy_pass http://novnc_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<style>#top_bar,.noVNC_button,.noVNC_panel{display:none!important}html,body,#screen{overflow:hidden!important}</style></head>';
        sub_filter_once on;
    }

    location /vnc/ {
        proxy_pass http://novnc_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── MyApp (:5000) ──

    location = /myapp { return 302 /myapp/; }

    location /myapp/ {
        # Strip the /myapp/ prefix so the Flask app sees plain '/...' routes.
        proxy_pass http://myapp_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Block conditional GETs so 304s never reach the student.
        proxy_set_header If-Modified-Since "";
        proxy_set_header If-None-Match "";

        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        gzip off;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Accel-Buffering "no" always;

        # Short connect timeout so the offline page kicks in fast during restarts.
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        error_page 502 503 504 = @myapp_offline;
    }

    location @myapp_offline {
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "no-store" always;
        add_header X-MyApp-Status "offline" always;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MyApp</title><style>html,body{margin:0;height:100%;background:#0d0d10;color:#aaa;font-family:system-ui,sans-serif}body{display:flex;align-items:center;justify-content:center;text-align:center}code{background:#222;padding:2px 6px;border-radius:4px;color:#b388ff}.box{max-width:520px;padding:24px}.spin{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:s 1s linear infinite;vertical-align:middle;margin-right:8px}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="box"><h2>MyApp is not running</h2><p>Write your script to <code>/opt/physicar/myapp/run.sh</code> and it will auto-start on port <code>5000</code>.</p><p style="color:#666"><span class="spin"></span>Auto-reloading…</p></div><script>setInterval(async()=>{try{const r=await fetch(location.pathname+(location.pathname.endsWith("/")?"":"/")+"?_t="+Date.now(),{cache:"no-store"});if(r.headers.get("X-MyApp-Status")!=="offline")location.reload()}catch(e){}},2000);</script></body></html>';
    }

    # ── Home ──

    location / {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        gzip off;
        add_header X-Accel-Buffering no always;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # When FastAPI is down nginx generates the 502 itself (connect refused),
        # so this error_page fires without proxy_intercept_errors.  We deliberately
        # do NOT enable intercept_errors so application-level 4xx/5xx (e.g. /joy/raw
        # returning 503 "waiting for data") pass through to the client unchanged.
        error_page 502 503 504 = @fastapi_offline;
    }

    # Served when FastAPI is down. Self-contained HTML+JS that polls
    # /health and reloads automatically when the backend returns.
    location @fastapi_offline {
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "no-store" always;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PhysiCar</title><style>html,body{margin:0;height:100%;background:#0d0d10;color:#888;font-family:system-ui,sans-serif}body{display:flex;align-items:center;justify-content:center}.spin{width:42px;height:42px;border:4px solid #2a2a33;border-top-color:#666;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="spin"></div><script>setInterval(async()=>{try{const r=await fetch("/health?t="+Date.now(),{cache:"no-store"});if(r.ok)location.reload()}catch(e){}},2000);</script></body></html>';
    }
}
