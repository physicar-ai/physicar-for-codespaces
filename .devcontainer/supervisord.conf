[supervisord]
nodaemon=false
logfile=/tmp/supervisord.log
logfile_maxbytes=5MB
logfile_backups=2
pidfile=/tmp/supervisord.pid
loglevel=info

[program:memory-setup]
command=/bin/bash %(ENV_HOME)s/physicar_ws/.devcontainer/memory-setup.sh
autostart=true
autorestart=false
startsecs=0
priority=100
stdout_logfile=/tmp/memory-setup.log
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=0
stderr_logfile=/tmp/memory-setup_err.log
stderr_logfile_maxbytes=1MB
stderr_logfile_backups=0

[program:minio-start]
command=/bin/bash -c "docker start s3-minio-1 2>/dev/null || (lsof -t -i :9000 | xargs -r kill -9 && sleep 1 && docker start s3-minio-1)"
autostart=true
autorestart=false
startsecs=0
priority=650
stdout_logfile=/tmp/minio-start.log
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=0
stderr_logfile=/tmp/minio-start_err.log
stderr_logfile_maxbytes=1MB
stderr_logfile_backups=0

[program:app]
command=/bin/bash %(ENV_HOME)s/physicar_ws/.devcontainer/start-app.sh
autostart=true
autorestart=true
startsecs=3
priority=900
stdout_logfile=/tmp/app.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/tmp/app_err.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

[program:app-browser]
command=/bin/bash %(ENV_HOME)s/physicar_ws/.devcontainer/app-browser.sh
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=1
priority=700
stopasgroup=true
killasgroup=true
stdout_logfile=/tmp/app-browser.log
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=1
stderr_logfile=/tmp/app-browser_err.log
stderr_logfile_maxbytes=1MB
stderr_logfile_backups=0

