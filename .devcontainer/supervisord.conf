[supervisord]
nodaemon=false
logfile=/tmp/supervisord.log
logfile_maxbytes=5MB
logfile_backups=2
pidfile=/tmp/supervisord.pid
loglevel=info

[program:swap-memory]
command=/bin/bash %(ENV_HOME)s/physicar_ws/.devcontainer/swap-memory.sh
autostart=true
autorestart=false
startsecs=0
priority=100
stdout_logfile=/tmp/swap-memory.log
stdout_logfile_maxbytes=1MB
stdout_logfile_backups=0
stderr_logfile=/tmp/swap-memory_err.log
stderr_logfile_maxbytes=1MB
stderr_logfile_backups=0

[program:xvfb]
command=Xvfb :1 -screen 0 800x600x24 -ac +extension GLX +render -noreset
autorestart=true
priority=200
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.log
redirect_stderr=true

[program:openbox]
command=openbox
environment=DISPLAY=":1"
autorestart=true
priority=210
depends_on=xvfb
stdout_logfile=/var/log/supervisor/openbox.log
stderr_logfile=/var/log/supervisor/openbox.log
redirect_stderr=true

[program:x11vnc]
command=x11vnc -display :1 -forever -nopw -shared -rfbport 5900
autorestart=true
priority=220
depends_on=xvfb
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc.log
redirect_stderr=true

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autorestart=true
priority=230
depends_on=x11vnc
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.log
redirect_stderr=true

[program:nginx]
command=nginx -g "daemon off;"
autorestart=true
priority=300
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.log
redirect_stderr=true

[program:gz_websocket]
command=gz launch %(ENV_HOME)s/physicar_ws/.devcontainer/physicar-sim/websocket.gzlaunch
environment=GZ_CONFIG_PATH="/usr/share/gz",GZ_PARTITION="physicar",DISPLAY=":1"
autorestart=true
priority=400
stdout_logfile=/var/log/supervisor/gz_websocket.log
stderr_logfile=/var/log/supervisor/gz_websocket.log
redirect_stderr=true
startsecs=5

[program:sim_api]
command=python3 %(ENV_HOME)s/physicar_ws/.devcontainer/physicar-sim/sim_api.py
environment=DISPLAY=":1",GZ_CONFIG_PATH="/usr/share/gz",GZ_PARTITION="physicar",GALLIUM_DRIVER="llvmpipe",MESA_GL_VERSION_OVERRIDE="3.3"
autorestart=true
priority=410
stdout_logfile=/var/log/supervisor/sim_api.log
stderr_logfile=/var/log/supervisor/sim_api.log
redirect_stderr=true
startsecs=3

